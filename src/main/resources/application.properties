# Application Properties
app.name=NotyCaption Pro
app.version=2026.5.0
app.author=NotY215

# Logging
logging.level.root=INFO
logging.file=logs/app.log

# UI
ui.default.theme=dark
ui.default.font=Segoe UI
ui.default.fontSize=14

# Hardware
hardware.monitoring.interval=1000
hardware.gpu.nvidia.enabled=true
hardware.gpu.amd.enabled=true
hardware.gpu.intel.enabled=true

# Audio
audio.sample.rate=16000
audio.channels=1
audio.ffmpeg.path=ffmpeg

# AI
ai.whisper.model=large-v1
ai.whisper.models.dir=models
ai.spleeter.stems=2

# Network
network.google.drive.enabled=true
network.timeout=30000
network.retry.attempts=3

# Subtitles
subtitle.default.format=srt
subtitle.default.words.per.line=5
subtitle.max.line.length=42
subtitle.max.lines=2